<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACNH Voice Generator</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      background: #111827;
      color: #f9fafb;
    }
    .container { max-width: 920px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .row { display: grid; grid-template-columns: 180px 1fr; gap: .75rem; align-items: center; margin: .75rem 0; }
    label { font-weight: 600; }
    select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      padding: .65rem .75rem;
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-top: 1rem; }
    button { cursor: pointer; font-weight: 700; }
    button:hover { background: #0b1220; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    audio { width: 100%; margin-top: 1rem; }
    .status { margin-top: .85rem; min-height: 1.5rem; color: #d1d5db; }
    .hint { font-size: .9rem; color: #9ca3af; }
    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Animalese Voice Generator</h1>
      <p class="hint">Pick a voice folder, choose localization fallback for text characters, then generate audio to preview or download as WAV/MP3.</p>

      <div class="row">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect"></select>
      </div>

      <div class="row">
        <label for="localeSelect">Localization</label>
        <select id="localeSelect"></select>
      </div>

      <div class="row">
        <label for="textInput">Text</label>
        <textarea id="textInput" placeholder="Type text here..."></textarea>
      </div>

      <div class="actions">
        <button id="generateBtn">Generate Audio</button>
        <button id="downloadWavBtn" disabled>Download WAV</button>
        <button id="downloadMp3Btn" disabled>Download MP3</button>
      </div>

      <audio id="preview" controls></audio>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <script src="java.js"></script>
</body>
</html>
